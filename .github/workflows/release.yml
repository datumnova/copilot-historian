name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Platform setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          NAME="copilot-historian-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "stage/$NAME" dist
          cp "target/${{ matrix.target }}/release/copilot-historian" "stage/$NAME/"
          cp README.md LICENSE "stage/$NAME/"
          tar -C stage -czf "dist/$NAME.tar.gz" "$NAME"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "copilot-historian-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "stage/$name", dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/copilot-historian.exe", README.md, LICENSE "stage/$name/"
          Compress-Archive -Path "stage/$name" -DestinationPath "dist/$name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        run: |
          TAG="$GITHUB_REF_NAME"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "copilot-historian $TAG" --generate-notes
          fi
          gh release upload "$TAG" dist/* --clobber
